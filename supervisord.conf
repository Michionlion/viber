[supervisord]
nodaemon=true
logfile=/tmp/supervisord.log
pidfile=/tmp/supervisord.pid

[program:code-server]
command=/usr/bin/env code-server --bind-addr 0.0.0.0:8080 /workspace
directory=/workspace
autostart=true
autorestart=true
startsecs=3
stdout_logfile=/tmp/code-server.out.log
stderr_logfile=/tmp/code-server.err.log
stdout_logfile_maxbytes=10MB
stderr_logfile_maxbytes=10MB

[program:ttyd]
command=/usr/local/bin/ttyd -i 0.0.0.0 -p 7681 -W /usr/local/bin/agent-shell
directory=/workspace
autostart=true
autorestart=true
startsecs=3
stdout_logfile=/tmp/ttyd.out.log
stderr_logfile=/tmp/ttyd.err.log
stdout_logfile_maxbytes=10MB
stderr_logfile_maxbytes=10MB
