services:
  devbox:
    build:
      context: .
    image: vibe-devbox:local
    container_name: devbox
    working_dir: /workspace
    read_only: false
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 512
    tmpfs:
      - /tmp
      - /run
      - /var/tmp
    ports:
      - "${BIND_IP:-127.0.0.1}:8080:8080"
      - "${BIND_IP:-127.0.0.1}:7681:7681"
      - "${BIND_IP:-127.0.0.1}:3000-3010:3000-3010"
    environment:
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-http://llm-server:8081/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-dummy}
      OPENAI_MODEL: ${OPENAI_MODEL:-Qwen3-Coder-Next.gguf}
      AIDER_MODEL: ${AIDER_MODEL:-openai/Qwen3-Coder-Next.gguf}
      QWEN_CODE_MODEL: ${QWEN_CODE_MODEL:-Qwen3-Coder-Next.gguf}
      AGENT_CMD: ${AGENT_CMD:-bash}
      TZ: ${TZ:-America/New_York}
      STACK_SSH_TARGET: ${STACK_SSH_TARGET:-}
      STACK_HOST_DIR: ${STACK_HOST_DIR:-}
      STACK_SSH_IDENTITY_FILE: ${STACK_SSH_IDENTITY_FILE:-}
      STACK_RELAUNCH_CMD: ${STACK_RELAUNCH_CMD:-docker compose up -d --build}
    volumes:
      - workspace-data:/workspace
      - coder-home:/home/coder
      - code-server-config:/home/coder/.config/code-server
      - agent-config:/home/coder/.config/agent
      - coder-local:/home/coder/.local
    depends_on:
      devbox-init:
        condition: service_completed_successfully
      llm-server:
        condition: service_started
    networks:
      - appnet

  devbox-init:
    image: vibe-devbox:local
    container_name: devbox-init
    user: root
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - DAC_OVERRIDE
      - CHOWN
      - FOWNER
    pids_limit: 64
    tmpfs:
      - /tmp
      - /run
    entrypoint: ["/usr/local/bin/devbox-init-entrypoint.sh"]
    volumes:
      - workspace-data:/workspace
      - coder-home:/home/coder
      - code-server-config:/home/coder/.config/code-server
      - agent-config:/home/coder/.config/agent
      - coder-local:/home/coder/.local

  llm-server:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: llm-server
    gpus: all
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - IPC_LOCK
    ulimits:
      memlock: -1
    shm_size: "8g"
    pids_limit: 256
    tmpfs:
      - /tmp
      - /run
    expose:
      - "8081"
    environment:
      HOME: /tmp
      XDG_CACHE_HOME: /tmp/.cache
    volumes:
      - ./models:/models:ro
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8081"
      - -m
      - /models/Qwen3-Coder-Next.gguf
      - --models-preset
      - /models/models.ini
      - --models-max
      - "1"
      - --mlock
      - --prio
      - "2"
    networks:
      - appnet

networks:
  appnet:
    driver: bridge

volumes:
  workspace-data:
  coder-home:
  code-server-config:
  agent-config:
  coder-local:
